spring:
  datasource:
    url: jdbc:h2:file:./data/rdpportal
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 9090

rdpportal:
  encryption-key: "UkRQUG9ydGFsRGVmYXVsdEtleS1DaGFuZ2VNZSEhMzI="  # Base64-encoded 32-byte AES key — override in production
